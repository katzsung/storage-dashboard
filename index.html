<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RallySight — Business Process Map</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --purple:#7c3aed; --purple-light:#ede9fe;
    --blue:#3b82f6; --blue-light:#dbeafe;
    --green:#10b981; --green-light:#d1fae5;
    --orange:#f59e0b; --orange-light:#fef3c7;
    --teal:#06b6d4; --teal-light:#cffafe;
    --red:#ef4444; --red-light:#fee2e2;
    --slate-900:#0f172a; --slate-700:#334155; --slate-500:#64748b;
    --slate-300:#cbd5e1; --slate-200:#e2e8f0; --slate-100:#f1f5f9;
    --bg:#f8f9fc; --card:#ffffff;
    --radius:16px;
    --shadow:0 1px 3px rgba(15,23,42,.07), 0 1px 2px rgba(15,23,42,.04);
    --shadow-lg:0 12px 28px rgba(15,23,42,.10), 0 2px 6px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--slate-900);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;}
  a{color:inherit;}
  svg{display:block;}

  /* Nav */
  .topnav{position:sticky;top:0;z-index:60;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--slate-200);}
  .nav-inner{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:6px;
    padding:0 24px;overflow-x:auto;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px;letter-spacing:-.2px;
    padding:14px 14px 14px 0;white-space:nowrap;}
  .brand-dot{width:11px;height:11px;border-radius:50%;background:var(--purple);box-shadow:0 0 0 4px var(--purple-light);}
  .navtab{border:none;background:transparent;padding:10px 16px;border-radius:999px;font-size:13.5px;font-weight:700;
    color:var(--slate-700);cursor:pointer;transition:.15s;white-space:nowrap;margin:8px 0;}
  .navtab:hover{color:var(--purple);background:var(--slate-100);}
  .navtab.active{background:var(--purple);color:#fff;box-shadow:0 2px 8px rgba(124,58,237,.35);}
  .navtab.disabled{color:var(--slate-300);cursor:not-allowed;}
  .navtab.disabled:hover{background:transparent;color:var(--slate-300);}
  .nav-spacer{flex:1;}
  .storage-btn{border:none;background:var(--slate-100);color:var(--slate-700);width:36px;height:36px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-left:6px;}
  .storage-btn:hover{background:var(--slate-200);}
  .customer-switcher{border:1.5px solid var(--purple);background:var(--purple-light);color:var(--purple);
    display:flex;align-items:center;gap:7px;padding:8px 12px;border-radius:999px;font-size:12.5px;font-weight:700;
    cursor:pointer;flex-shrink:0;white-space:nowrap;max-width:200px;}
  .customer-switcher:hover{background:#e3d5fc;}
  .customer-switcher span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px;}
  .customer-switcher.none{border-color:var(--slate-300);background:var(--slate-100);color:var(--slate-500);}

  /* Customer chips inside branch bodies */
  .customer-context{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;padding:9px 12px;
    border-radius:10px;background:#fff;border:1px solid var(--slate-200);font-size:12px;}
  .customer-context.warn{border-color:#fcd34d;background:#fffbeb;color:#92400e;font-weight:600;}
  .customer-context .switch-link{color:var(--purple);font-weight:700;cursor:pointer;text-decoration:underline;}
  .doc-customer-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;
    border-radius:999px;background:var(--slate-100);color:var(--slate-700);flex-shrink:0;white-space:nowrap;}
  .doc-customer-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .doc-dropzone.disabled{opacity:.55;cursor:not-allowed;}
  .doc-filter{width:100%;padding:8px 11px;border:1px solid var(--slate-200);border-radius:9px;font-size:12px;
    margin-bottom:10px;outline:none;}
  .doc-filter:focus{border-color:var(--purple);}

  /* Customers modal list */
  .cust-row{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--slate-200);border-radius:10px;margin-bottom:8px;cursor:pointer;}
  .cust-row:hover{border-color:var(--purple);background:var(--purple-light);}
  .cust-row.active{border-color:var(--purple);background:var(--purple-light);}
  .cust-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:12px;color:#fff;flex-shrink:0;}
  .cust-info{flex:1;min-width:0;}
  .cust-info .cname{font-size:13px;font-weight:700;}
  .cust-info .cmeta{font-size:11px;color:var(--slate-500);}
  .cust-actions{display:flex;gap:4px;}
  .cust-form{display:flex;flex-direction:column;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--slate-200);}
  .cust-form input{padding:9px 12px;border:1px solid var(--slate-200);border-radius:9px;font-size:13px;outline:none;}
  .cust-form input:focus{border-color:var(--purple);}

  /* Customer dashboard */
  .dash-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
  .search-box{position:relative;}
  .search-box svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;
    color:var(--slate-500);pointer-events:none;}
  .search-box input{padding:9px 14px 9px 34px;border:1px solid var(--slate-200);border-radius:10px;font-size:13.5px;
    outline:none;transition:.15s;background:var(--slate-100);}
  .search-box input:focus{background:#fff;border-color:var(--purple);box-shadow:0 0 0 3px var(--purple-light);}
  .dash-toolbar .search-box{flex:1;min-width:200px;}
  .dash-toolbar .search-box input{width:100%;}
  .cust-dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .cust-dash-card{border:1px solid var(--slate-200);border-radius:16px;background:#fff;padding:16px;cursor:pointer;transition:.15s;}
  .cust-dash-card:hover{box-shadow:var(--shadow-lg);border-color:var(--slate-300);transform:translateY(-2px);}
  .cust-dash-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .cust-avatar-lg{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:13px;color:#fff;flex-shrink:0;}
  .cdc-name{font-size:14px;font-weight:800;}
  .cdc-meta{font-size:11.5px;color:var(--slate-500);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .cust-stage-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
  .stage-chip{font-size:10px;font-weight:700;padding:4px 9px;border-radius:999px;background:var(--slate-100);color:var(--slate-500);
    border:1px solid var(--slate-200);}
  .stage-chip.on{background:var(--chip-bg);color:var(--chip-color);border-color:var(--chip-color);}
  .cust-dash-foot{display:flex;justify-content:space-between;font-size:11px;color:var(--slate-500);font-weight:600;
    border-top:1px solid var(--slate-200);padding-top:10px;}
  .dash-empty{padding:60px 20px;text-align:center;color:var(--slate-500);}
  .dash-empty .btn{margin-top:12px;}
  .flex1{flex:1;min-width:0;}

  /* Customer profile page */
  .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--slate-500);font-size:13px;font-weight:700;
    cursor:pointer;margin-bottom:18px;}
  .back-link:hover{color:var(--purple);}
  .profile-head{display:flex;align-items:center;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
  .profile-head .cust-avatar{width:56px;height:56px;font-size:19px;flex-shrink:0;}
  .profile-head h2{margin:0 0 3px;font-size:22px;}
  .profile-head .meta{font-size:13px;color:var(--slate-500);}
  .profile-actions{display:flex;gap:8px;margin-left:auto;}

  .journey-wrap{background:var(--card);border:1px solid var(--slate-200);border-radius:20px;box-shadow:var(--shadow);
    padding:26px 24px;margin-bottom:24px;}
  .journey-progress-label{font-size:12.5px;font-weight:700;color:var(--slate-500);margin-bottom:8px;}
  .journey-progress-bar{width:100%;height:8px;background:var(--slate-100);border-radius:99px;overflow:hidden;margin-bottom:20px;}
  .journey-progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--blue));border-radius:99px;transition:.3s;}
  .journey-stepper{display:flex;align-items:flex-start;}
  .journey-step{display:flex;flex-direction:column;align-items:center;text-align:center;width:120px;flex-shrink:0;}
  .journey-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:14px;border:2px solid var(--slate-300);color:var(--slate-400);background:#fff;margin-bottom:8px;}
  .journey-dot.progress{border-color:var(--purple);color:var(--purple);background:var(--purple-light);}
  .journey-dot.done{border-color:var(--green);color:#fff;background:var(--green);}
  .journey-label{font-size:12.5px;font-weight:800;}
  .journey-sub{font-size:11px;color:var(--slate-500);margin-top:1px;}
  .journey-line{flex:1;height:2px;background:var(--slate-200);margin:19px 4px 0;}
  .journey-line.done{background:var(--green);}

  .stage-section{margin-bottom:20px;}
  .stage-section-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .stage-section-head h4{margin:0;font-size:14px;}
  .stage-branch-label{font-size:11.5px;font-weight:700;color:var(--slate-500);margin:10px 0 6px;padding-left:2px;}
  .stage-empty{font-size:12px;color:var(--slate-500);padding:10px 0;}

  .container{max-width:1240px;margin:0 auto;padding:0 24px 90px;}
  .tabpage{display:none;}
  .tabpage.active{display:block;}

  /* Hero */
  .hero{max-width:900px;margin:0 auto;padding:44px 24px 6px;text-align:center;}
  .badge{display:inline-block;background:var(--purple-light);color:var(--purple);font-weight:700;font-size:12.5px;
    padding:6px 16px;border-radius:999px;margin-bottom:16px;}
  .hero h1{font-size:34px;margin:0 0 10px;letter-spacing:-1px;font-weight:800;}
  .hero p{color:var(--slate-500);font-size:15px;max-width:600px;margin:0 auto;line-height:1.55;}

  .section{margin:40px 0;}
  .section-head{display:flex;align-items:center;gap:10px;margin:0 0 16px;}
  .section-bar{width:5px;height:20px;border-radius:3px;background:var(--purple);}
  .section-head h2{font-size:18px;margin:0;font-weight:800;}

  .panel{background:var(--card);border:1px solid var(--slate-200);border-radius:20px;box-shadow:var(--shadow);padding:22px;}

  /* Org chart */
  .org-wrap{overflow-x:auto;padding:6px;}
  .org-tree{display:flex;flex-direction:column;align-items:center;gap:0;min-width:600px;}
  .org-row{display:flex;justify-content:center;gap:36px;position:relative;padding-top:22px;}
  .org-row::before{content:'';position:absolute;top:0;left:50%;width:0;border-left:1.5px solid var(--slate-300);height:22px;}
  .org-children{display:flex;flex-direction:column;align-items:center;position:relative;padding-top:22px;}
  .org-children::before,.org-children::after{content:'';position:absolute;top:0;height:22px;}
  .org-children::before{right:50%;left:0;border-top:1.5px solid var(--slate-300);}
  .org-children::after{left:50%;right:0;border-top:1.5px solid var(--slate-300);border-left:1.5px solid var(--slate-300);}
  .org-children:first-child::before{border-top:none;}
  .org-children:last-child::after{border-top:none;}
  .org-children:only-child::before,.org-children:only-child::after{display:none;}
  .org-children:only-child{padding-top:0;}
  .org-node{border:1.5px solid; border-radius:12px;padding:10px 16px;background:#fff;text-align:center;min-width:130px;
    font-size:12.5px;font-weight:800;margin:8px 6px;position:relative;}
  .org-children>.org-node::before{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);
    border-left:4px solid transparent;border-right:4px solid transparent;border-top:6px solid var(--slate-400);}
  .org-node .sub{font-weight:500;color:var(--slate-500);font-size:11px;margin-top:2px;}
  .legend-row{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:22px;padding-top:18px;border-top:1px solid var(--slate-200);}
  .legend-chip{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--slate-700);}
  .legend-dot{width:11px;height:11px;border-radius:4px;}

  /* Info cards (sources/components/streams/channels) */
  .info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .info-card{border:1px solid var(--slate-200);border-radius:14px;padding:16px;background:#fff;}
  .info-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-weight:800;font-size:12px;}
  .info-card h4{margin:0 0 3px;font-size:13.5px;}
  .info-card p{margin:0 0 8px;font-size:12px;color:var(--slate-500);}
  .info-tag{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;}

  /* Branch cards (documents) */
  .branch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .branch-card{border:1px solid var(--slate-200);border-radius:16px;background:#fff;overflow:hidden;transition:.15s;}
  .branch-card:hover{box-shadow:var(--shadow-lg);}
  .branch-head{display:flex;align-items:center;gap:12px;padding:16px;cursor:pointer;}
  .branch-chip{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:12.5px;flex-shrink:0;}
  .branch-info{flex:1;min-width:0;}
  .branch-info h4{margin:0 0 4px;font-size:14px;}
  .branch-desc{margin:0 0 7px;font-size:11.5px;color:var(--slate-500);line-height:1.45;}
  .branch-tag{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;margin-right:6px;}
  .branch-doc-count{font-size:11px;color:var(--slate-500);font-weight:600;}
  .branch-chevron{transition:.2s;color:var(--slate-500);flex-shrink:0;}
  .branch-card.open .branch-chevron{transform:rotate(180deg);}
  .branch-foot{padding:0 16px 16px;}
  .branch-viewdoc-btn{width:100%;border:1px solid var(--slate-200);background:var(--slate-100);color:var(--slate-700);
    border-radius:10px;padding:8px 12px;font-size:11.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;
    justify-content:center;gap:6px;transition:.15s;}
  .branch-viewdoc-btn:hover{background:var(--slate-200);}
  .branch-body{display:none;border-top:1px solid var(--slate-200);padding:16px;background:var(--slate-100);}
  .branch-card.open .branch-body{display:block;}

  /* Document viewer modal */
  .docmodal-header{display:flex;gap:14px;align-items:flex-start;margin:-22px -22px 0;padding:20px 46px 20px 22px;border-radius:16px 16px 0 0;}
  .docmodal-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:13px;flex-shrink:0;background:#fff;}
  .docmodal-headtext{flex:1;min-width:0;}
  .docmodal-headtext h3{margin:0 0 4px;font-size:17px;}
  .docmodal-headtext p{margin:0 0 10px;font-size:12.5px;color:var(--slate-600);line-height:1.5;}
  .docmodal-meta{display:flex;flex-wrap:wrap;gap:8px;}
  .docmodal-chip{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;background:#fff;
    color:var(--slate-600);border:1px solid var(--slate-200);}
  .docmodal-chip.status{background:var(--green);color:#fff;border-color:var(--green);}
  .docmodal-tabs{display:flex;gap:4px;padding:14px 22px 0;border-bottom:1px solid var(--slate-200);margin:0 -22px;flex-wrap:wrap;}
  .docmodal-tabbtn{border:none;background:transparent;padding:8px 14px;font-size:12.5px;font-weight:700;color:var(--slate-500);
    cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
  .docmodal-tabbtn.active{color:var(--purple);border-bottom-color:var(--purple);}
  .docmodal-tabbtn:hover:not(.active){color:var(--slate-700);}
  .docmodal-body{padding:18px 2px 4px;}
  .docmodal-section{margin-bottom:22px;}
  .docmodal-section:last-child{margin-bottom:0;}
  .docmodal-section h5{font-size:12.5px;font-weight:800;margin:0 0 10px;padding-left:10px;border-left:3px solid var(--purple);}
  .doc-checklist{display:flex;flex-direction:column;gap:9px;}
  .doc-check-row{display:flex;align-items:flex-start;gap:10px;font-size:12.5px;}
  .doc-check-box{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--slate-300);flex-shrink:0;margin-top:1px;}
  .doc-check-text{flex:1;color:var(--slate-700);line-height:1.45;}
  .doc-check-tag{font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;flex-shrink:0;white-space:nowrap;}
  .doc-check-tag.required{background:var(--red-light);color:#b91c1c;}
  .doc-check-tag.automatic{background:var(--slate-200);color:var(--slate-600);}
  .doc-table-wrap{overflow-x:auto;}
  .doc-table{width:100%;border-collapse:collapse;font-size:12px;}
  .doc-table th{text-align:left;font-size:10.5px;font-weight:800;color:var(--slate-500);padding:8px 10px;
    background:var(--slate-100);text-transform:uppercase;letter-spacing:.02em;white-space:nowrap;}
  .doc-table td{padding:9px 10px;border-top:1px solid var(--slate-200);color:var(--slate-700);vertical-align:top;}
  .doc-table-key{font-weight:700;color:var(--slate-900);white-space:nowrap;}
  .doc-steps{display:flex;flex-direction:column;gap:14px;}
  .doc-step-row{display:flex;gap:12px;}
  .doc-step-num{width:24px;height:24px;border-radius:50%;background:var(--purple);color:#fff;font-weight:800;font-size:11.5px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .doc-step-title{font-size:12.5px;font-weight:700;color:var(--slate-900);}
  .doc-step-desc{font-size:11.5px;color:var(--slate-500);margin-top:2px;line-height:1.45;}
  .doc-milestones{display:flex;flex-direction:column;gap:14px;}
  .doc-milestone-label{font-size:12px;font-weight:800;color:var(--purple);margin-bottom:6px;}
  .doc-milestones ul{margin:0;padding-left:18px;}
  .doc-milestones li{font-size:12px;color:var(--slate-700);margin-bottom:4px;line-height:1.45;}

  /* Document mini-manager (reused inside branch body) */
  .doc-dropzone{border:2px dashed var(--slate-300);border-radius:12px;padding:16px;text-align:center;cursor:pointer;
    background:#fff;margin-bottom:12px;transition:.15s;}
  .doc-dropzone.drag{border-color:var(--purple);background:var(--purple-light);}
  .doc-dropzone span{font-size:12px;color:var(--slate-500);font-weight:600;}
  .doc-list{display:flex;flex-direction:column;gap:8px;}
  .doc-row{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--slate-200);border-radius:10px;padding:9px 11px;}
  .doc-chip{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;}
  .doc-row .flex1{flex:1;min-width:0;}
  .doc-name{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .doc-meta{font-size:10.5px;color:var(--slate-500);}
  .doc-actions{display:flex;gap:4px;}
  .mini-btn{width:26px;height:26px;border-radius:7px;border:none;background:var(--slate-100);color:var(--slate-500);
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
  .mini-btn:hover{background:var(--slate-200);color:var(--slate-900);}
  .doc-empty{font-size:12px;color:var(--slate-500);text-align:center;padding:10px;}

  /* Workflow */
  .workflow-wrap{overflow-x:auto;padding:8px 4px;}
  .workflow-row{display:flex;gap:10px;min-width:max-content;}
  .wf-step{width:150px;flex-shrink:0;text-align:center;position:relative;}
  .wf-num{width:30px;height:30px;border-radius:50%;background:var(--purple);color:#fff;font-weight:800;font-size:13px;
    display:flex;align-items:center;justify-content:center;margin:0 auto 8px;}
  .wf-step h5{margin:0 0 3px;font-size:12.5px;}
  .wf-step p{margin:0;font-size:11px;color:var(--slate-500);}
  .wf-arrow{color:var(--slate-300);display:flex;align-items:center;flex-shrink:0;}

  /* Process Flows (Business Map) */
  .flow-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:start;}
  .flow-col{display:flex;flex-direction:column;}

  .kpi-target{font-size:10.5px;color:var(--slate-500);margin-top:2px;}

/* ============================== IndexedDB ============================== */
const DB_NAME = "rallysight_business_map_db_v1";
const DB_VERSION = 2;
let db;
function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e=>{
      const d = e.target.result;
      if(!d.objectStoreNames.contains("files")){
        const fs = d.createObjectStore("files", {keyPath:"id"});
        fs.createIndex("folderId","folderId");
        fs.createIndex("customerId","customerId");
      }
      if(!d.objectStoreNames.contains("activity")) d.createObjectStore("activity", {keyPath:"id"});
      if(!d.objectStoreNames.contains("customers")) d.createObjectStore("customers", {keyPath:"id"});
      if(!d.objectStoreNames.contains("meta")) d.createObjectStore("meta", {keyPath:"key"});
    };
    req.onsuccess = e=>resolve(e.target.result);
    req.onerror = e=>reject(e.target.error);
  });
}
function tx(store,mode){ return db.transaction(store,mode).objectStore(store); }
function put(store,obj){ return new Promise((res,rej)=>{ const r=tx(store,"readwrite").put(obj); r.onsuccess=()=>res(obj); r.onerror=()=>rej(r.error); }); }
function del(store,id){ return new Promise((res,rej)=>{ const r=tx(store,"readwrite").delete(id); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); }
function getAll(store){ return new Promise((res,rej)=>{ const r=tx(store,"readonly").getAll(); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }

function customerColor(id){ if(!id) return "var(--slate-500)"; let h=0; for(let i=0;i<id.length;i++) h=(h*31+id.charCodeAt(i))>>>0; return COLORS[CUSTOMER_COLORS[h%CUSTOMER_COLORS.length]].c; }
function customerById(id){ return customers.find(c=>c.id===id); }
function customerLabel(id){ const c = customerById(id); return c ? c.name : "Unassigned"; }
const uid = ()=> (crypto.randomUUID ? crypto.randomUUID() : "id-"+Date.now()+"-"+Math.random().toString(16).slice(2));

function formatBytes(b){ if(!b) return "0 B"; const u=["B","KB","MB","GB"]; let i=0; while(b>=1024&&i<u.length-1){b/=1024;i++;} return (i===0?b:b.toFixed(1))+" "+u[i]; }
function timeAgo(ts){ const s=Math.floor((Date.now()-ts)/1000); if(s<10)return "just now"; if(s<60)return s+"s ago"; const m=Math.floor(s/60); if(m<60)return m+"m ago"; const h=Math.floor(m/60); if(h<24)return h+"h ago"; const d=Math.floor(h/24); return d+"d ago"; }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function extOf(name){ const p=name.split("."); return p.length>1 ? p.pop().toUpperCase().slice(0,4) : "FILE"; }

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove("show"), 2200);
}

}

function renderDocBody(bid, filterText){
  filterText = (filterText||"").toLowerCase();
  const list = branchFiles(bid);
  const countEl = document.querySelector(`[data-count="${bid}"]`);
  if(countEl) countEl.textContent = list.length+" document"+(list.length===1?"":"s");
  const body = document.querySelector(`[data-body="${bid}"]`);
  if(!body) return;

  const shown = list.filter(f=> !filterText || f.name.toLowerCase().includes(filterText) || customerLabel(f.customerId).toLowerCase().includes(filterText));
  const hasActive = !!activeCustomerId;
  const activeName = hasActive ? customerLabel(activeCustomerId) : "";

  body.innerHTML = `
    <div class="customer-context ${hasActive?'':'warn'}">
      ${hasActive
        ? `<span class="doc-customer-dot" style="background:${customerColor(activeCustomerId)}"></span> Uploading as <strong>${esc(activeName)}</strong> — <span class="switch-link" data-switch-customer="1">switch customer</span>`
        : `⚠ No customer selected — <span class="switch-link" data-switch-customer="1">choose a customer</span> before uploading`}
    </div>
    <div class="doc-dropzone ${hasActive?'':'disabled'}" data-dz="${bid}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" style="margin:0 auto 6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span>${hasActive ? `Drag &amp; drop or click to upload documents for <strong>${esc(activeName)}</strong>` : "Select a customer above to enable uploads"}</span>
    </div>
    ${list.length>3 ? `<input type="text" class="doc-filter" data-filter="${bid}" placeholder="Filter by document or customer name..." value="${esc(filterText)}">` : ""}
    <div class="doc-list">${shown.length ? shown.map(f=>`
      <div class="doc-row">
        <div class="doc-chip" style="background:var(--slate-200);color:var(--slate-700)">${esc(extOf(f.name))}</div>
        <div class="flex1">
          <div class="doc-name">${esc(f.name)}</div>
          <div class="doc-meta">${formatBytes(f.size)} · ${timeAgo(f.createdAt)}</div>
        </div>
        <span class="doc-customer-tag"><span class="doc-customer-dot" style="background:${customerColor(f.customerId)}"></span>${esc(customerLabel(f.customerId))}</span>
        <div class="doc-actions">
          <button class="mini-btn" data-dl="${f.id}" title="Download">⬇</button>
          <button class="mini-btn" data-del="${f.id}" data-belongs="${bid}" title="Delete">🗑</button>
        </div>
      </div>`).join("") : `<div class="doc-empty">${list.length ? "No documents match that filter." : "No documents stored yet for this branch."}</div>`}
    </div>`;

  const dz = body.querySelector(`[data-dz]`);
  dz.addEventListener("click", ()=>{
    if(!activeCustomerId){ openCustomerModal(bid); return; }
    pendingUpload = {bid, customerId: activeCustomerId, onDone: ()=>{ renderDocBody(bid); refreshDashboardBody(); }};
    document.getElementById("fileInput").click();
  });
  ["dragenter","dragover"].forEach(ev=>dz.addEventListener(ev,e=>{ e.preventDefault(); e.stopPropagation(); if(activeCustomerId) dz.classList.add("drag"); }));
  ["dragleave","drop"].forEach(ev=>dz.addEventListener(ev,e=>{ e.preventDefault(); e.stopPropagation(); dz.classList.remove("drag"); }));
  dz.addEventListener("drop", e=>{ if(!activeCustomerId){ openCustomerModal(bid); return; } if(e.dataTransfer.files.length) handleBranchFiles(bid, e.dataTransfer.files); });

  body.querySelectorAll("[data-switch-customer]").forEach(el=>el.addEventListener("click",()=>openCustomerModal(bid)));
  const filterInput = body.querySelector("[data-filter]");
  if(filterInput){
    filterInput.addEventListener("input", e=>renderDocBody(bid, e.target.value));
    if(filterText){ filterInput.focus(); filterInput.setSelectionRange(filterText.length, filterText.length); }
  }

  body.querySelectorAll("[data-dl]").forEach(b=>b.addEventListener("click",(e)=>{ e.stopPropagation(); downloadFile(b.dataset.dl); }));
  body.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",(e)=>{ e.stopPropagation(); deleteFile(b.dataset.del, b.dataset.belongs); }));
}

function downloadFile(id){
  const f = files.find(x=>x.id===id); if(!f) return;
  const url = URL.createObjectURL(f.blob);
  const a = document.createElement("a"); a.href=url; a.download=f.name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
  logActivity(`Downloaded "${f.name}"`, "var(--teal)");
}

async function deleteFile(id, bid){
  const f = files.find(x=>x.id===id); if(!f) return;
  if(!confirm(`Delete "${f.name}"? This can't be undone.`)) return;
  await del("files", id);
  files = files.filter(x=>x.id!==id);
  logActivity(`Deleted "${f.name}"`, "var(--red)");
  toast("Deleted");
  renderDocBody(bid);
  updateStorageStats();
  refreshDashboardBody();
}

async function updateStorageStats(){
  const totalDocs = files.length;
  const totalBytes = files.reduce((s,f)=>s+(f.size||0),0);
  const branchesUsed = new Set(files.map(f=>f.folderId)).size;
  const el = document.getElementById("modalBox");
  if(el && el.dataset.mode === "storage"){
    document.getElementById("aggDocs").textContent = totalDocs;
    document.getElementById("aggSize").textContent = formatBytes(totalBytes);
    document.getElementById("aggBranches").textContent = branchesUsed;
  }
}

function openStorageModal(){
  const overlay = document.getElementById("modalOverlay");
  const box = document.getElementById("modalBox");
  box.dataset.mode = "storage";
  box.style.width = "480px";
  const totalDocs = files.length;
  const totalBytes = files.reduce((s,f)=>s+(f.size||0),0);
  const branchesUsed = new Set(files.map(f=>f.folderId)).size;

    <button class="modal-close" id="modalCloseBtn">✕</button>
    <h3>Storage &amp; Activity</h3>
    <div class="stat-strip" style="grid-template-columns:repeat(4,1fr);margin-bottom:18px;">
      <div class="stat-card"><div class="stat-num" id="aggDocs">${totalDocs}</div><div class="stat-label">Documents</div></div>
      <div class="stat-card"><div class="stat-num" id="aggSize">${formatBytes(totalBytes)}</div><div class="stat-label">Storage used</div></div>
      <div class="stat-card"><div class="stat-num" id="aggBranches">${branchesUsed}</div><div class="stat-label">Branches with docs</div></div>

    </div>
    <div class="settings-row">

      <button class="btn btn-ghost" id="manageCustBtn">Open</button>
    </div>
    <div class="settings-row">
      <div><h4>Export document inventory</h4><p>CSV list of every stored document, its branch, and customer.</p></div>
      <button class="btn btn-ghost" id="exportBtn">Export</button>
    </div>
    <div class="settings-row">
      <div><h4>Clear all data</h4><p>Permanently deletes every stored document in this browser.</p></div>
      <button class="btn btn-danger" id="clearAllBtn">Clear</button>
    </div>
    <h3 style="margin-top:18px;">Recent Activity</h3>
    <div id="activityList"></div>
  `;
  renderActivityList();

function renderActivityList(){
  const c = document.getElementById("activityList");
  if(!c) return;
  if(activityLog.length===0){ c.innerHTML = `<div class="doc-empty">No activity yet.</div>`; return; }
  c.innerHTML = activityLog.slice(0,30).map(a=>`
    <div class="activity-item" style="border-left-color:${a.color}">
      <span class="activity-dot" style="background:${a.color}"></span>
      <div><div>${esc(a.text)}</div><div class="activity-time">${timeAgo(a.ts)}</div></div>
    </div>`).join("");
}

function exportCSV(){
  const rows = [["Customer","Branch","Document Name","Size (bytes)","Type","Added"]];
  files.forEach(f=> rows.push([customerLabel(f.customerId), branchLabel(f.folderId), f.name, f.size, f.type, new Date(f.createdAt).toISOString()]));
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download="document-inventory.csv";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
  toast("Inventory exported");
}

async function clearAll(){
  if(!confirm("This will permanently delete ALL stored documents and customers. Continue?")) return;
  if(!confirm("Are you absolutely sure? This cannot be undone.")) return;
  for(const f of files) await del("files", f.id);
  for(const a of activityLog) await del("activity", a.id);
  for(const c of customers) await del("customers", c.id);
  await put("meta", {key:"activeCustomerId", value:null});
  files = []; activityLog = []; customers = []; activeCustomerId = null;
  updateCustomerSwitcherUI();
  toast("All data cleared");
  closeModal();
  document.querySelectorAll(".branch-card").forEach(card=>{
    const bid = card.dataset.branch;
    if(card.classList.contains("open")) renderDocBody(bid);
    const countEl = document.querySelector(`[data-count="${bid}"]`);
    if(countEl) countEl.textContent = "0 documents";
  });
  refreshDashboardBody();
}

function closeModal(){ document.getElementById("modalOverlay").classList.remove("show"); }

/* ============================== Customers (client CRM) ============================== */
function customerDocCount(id){ return files.filter(f=>f.customerId===id).length; }

function updateCustomerSwitcherUI(){
  const btn = document.getElementById("customerSwitcherBtn");
  const label = document.getElementById("customerSwitcherLabel");
  if(activeCustomerId && customerById(activeCustomerId)){
    label.textContent = customerById(activeCustomerId).name;
    btn.classList.remove("none");
  } else {
    label.textContent = "Select customer";
    btn.classList.add("none");
    activeCustomerId = null;
  }
}

async function setActiveCustomer(id){
  activeCustomerId = id;
  await put("meta", {key:"activeCustomerId", value:id});
  updateCustomerSwitcherUI();
  document.querySelectorAll(".branch-card.open").forEach(card=>renderDocBody(card.dataset.branch));
}

async function addCustomerRecord(name, company, email){
  const rec = {id:uid(), name:name.trim(), company:(company||"").trim(), email:(email||"").trim(), createdAt:Date.now()};
  await put("customers", rec);
  customers.push(rec);
  logActivity(`Added customer "${rec.name}"`, "var(--purple)");
  refreshDashboardBody();
  return rec;
}

async function deleteCustomerRecord(id){
  const c = customerById(id); if(!c) return;
  const docCount = customerDocCount(id);
  const msg = docCount>0
    ? `Delete "${c.name}"? Their ${docCount} document${docCount===1?"":"s"} will be kept but marked Unassigned.`
    : `Delete "${c.name}"?`;
  if(!confirm(msg)) return;
  await del("customers", id);
  customers = customers.filter(x=>x.id!==id);
  if(activeCustomerId===id){ activeCustomerId=null; await put("meta",{key:"activeCustomerId", value:null}); }
  logActivity(`Deleted customer "${c.name}"`, "var(--red)");
  updateCustomerSwitcherUI();
  refreshDashboardBody();
}

function openCustomerModal(returnBid){
  const overlay = document.getElementById("modalOverlay");
  const box = document.getElementById("modalBox");
  box.dataset.mode = "customers";
  box.style.width = "440px";
  const search = "";
  box.innerHTML = `
    <button class="modal-close" id="modalCloseBtn">✕</button>
    <h3>Customers</h3>
    <input type="text" id="custSearch" placeholder="Search customers..." style="margin-bottom:12px;">
    <div id="custList"></div>
    <div class="cust-form">
      <input type="text" id="custName" placeholder="Customer / company name *">
      <input type="text" id="custCompany" placeholder="Company (optional)">
      <input type="text" id="custEmail" placeholder="Email (optional)">
      <button class="btn btn-primary" id="custAddBtn" style="justify-content:center;">+ Add customer</button>
    </div>
  `;
  overlay.classList.add("show");

  function renderList(filterText){
    filterText = (filterText||"").toLowerCase();
    const list = customers.filter(c=> !filterText || c.name.toLowerCase().includes(filterText) || (c.company||"").toLowerCase().includes(filterText));
    const c1 = document.getElementById("custList");
    if(!list.length){ c1.innerHTML = `<div class="doc-empty">${customers.length ? "No matches." : "No customers yet — add one below."}</div>`; return; }
    c1.innerHTML = list.map(c=>{
      const initials = c.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
      const dc = customerDocCount(c.id);
      return `<div class="cust-row ${c.id===activeCustomerId?'active':''}" data-select="${c.id}">
        <div class="cust-avatar" style="background:${customerColor(c.id)}">${esc(initials)}</div>
        <div class="cust-info"><div class="cname">${esc(c.name)}</div><div class="cmeta">${esc(c.company||"")}${c.company?" · ":""}${dc} document${dc===1?"":"s"}</div></div>
        <div class="cust-actions"><button class="mini-btn" data-del-cust="${c.id}" title="Delete">🗑</button></div>
      </div>`;
    }).join("");
    c1.querySelectorAll("[data-select]").forEach(el=>el.addEventListener("click", (e)=>{
      if(e.target.closest("[data-del-cust]")) return;
      setActiveCustomer(el.dataset.select);
      closeModal();
      if(returnBid) renderDocBody(returnBid);
    }));
    c1.querySelectorAll("[data-del-cust]").forEach(el=>el.addEventListener("click", async (e)=>{ e.stopPropagation(); await deleteCustomerRecord(el.dataset.delCust); openCustomerModal(returnBid); }));
  }
  renderList(search);

  document.getElementById("custSearch").addEventListener("input", e=>renderList(e.target.value));
  document.getElementById("modalCloseBtn").onclick = closeModal;
  document.getElementById("custAddBtn").onclick = async ()=>{
    const nameEl = document.getElementById("custName");
    const name = nameEl.value.trim();
    if(!name){ nameEl.focus(); return; }
    const rec = await addCustomerRecord(name, document.getElementById("custCompany").value, document.getElementById("custEmail").value);
    toast(`Customer "${rec.name}" added`);
    setActiveCustomer(rec.id);
    document.getElementById("custName").value = "";
    document.getElementById("custCompany").value = "";
    document.getElementById("custEmail").value = "";
    renderList(document.getElementById("custSearch").value);
  };
}

let currentDashboardSearch = "";
let pendingUpload = null;

async function uploadFilesForCustomerBranch(customerId, bid, fileList){
  const list = Array.from(fileList);
  for(const f of list){
    const record = {id:uid(), name:f.name, type:f.type||"application/octet-stream", size:f.size, blob:f, folderId:bid, customerId, createdAt:Date.now()};
    await put("files", record);
    files.push(record);
  }
  const label = branchLabel(bid);
  const cname = customerLabel(customerId);
  logActivity(`Uploaded ${list.length} document${list.length===1?"":"s"} to "${label}" for ${cname}`, "var(--blue)");
  toast(`${list.length} document${list.length===1?"":"s"} uploaded for ${cname}`);
  updateStorageStats();
  return list.length;
}

function refreshAfterFileChange(bid){
  const card = bid ? document.querySelector(`.branch-card[data-branch="${bid}"]`) : null;
  if(card && card.classList.contains("open")) renderDocBody(bid);
  refreshDashboardBody();
  refreshProfileIfOpen();
}

function refreshDashboardBody(){
  if(document.getElementById("customerDashboardBody")) renderCustomerDashboardBody(currentDashboardSearch);
}

  const totalBytes = files.reduce((s,f)=>s+(f.size||0),0);
  const fullyEngaged = customers.filter(c=>customerStageStats(c.id).every(s=>s.touched>0)).length;
  const list = customers.filter(c=> !q || c.name.toLowerCase().includes(q) || (c.company||"").toLowerCase().includes(q))
    .sort((a,b)=>customerLastActivity(b.id)-customerLastActivity(a.id));

  container.innerHTML = `
    <div class="stat-strip" style="margin-bottom:22px;">
      <div class="stat-card"><div class="stat-num">${customers.length}</div><div class="stat-label">Customers</div></div>

      <div class="stat-card"><div class="stat-num">${formatBytes(totalBytes)}</div><div class="stat-label">Storage used</div></div>
      <div class="stat-card"><div class="stat-num">${fullyEngaged}</div><div class="stat-label">Fully onboarded (all 4 stages)</div></div>
    </div>
    <div class="dash-toolbar">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="dashSearch" placeholder="Search customers or companies..." value="${esc(currentDashboardSearch)}">
      </div>
      <button class="btn btn-primary" id="dashAddCustBtn">+ Add Customer</button>
    </div>
    ${list.length ? `<div class="cust-dash-grid">${list.map(c=>{
        const initials = c.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
        const stats = customerStageStats(c.id);
        const docs = customerFiles(c.id);
        const size = docs.reduce((s,f)=>s+(f.size||0),0);
        return `<div class="cust-dash-card" data-open-customer="${c.id}">
          <div class="cust-dash-head">
            <div class="cust-avatar-lg" style="background:${customerColor(c.id)}">${esc(initials)}</div>
            <div class="flex1">

            </div>
          </div>
          <div class="cust-stage-row">${stats.map(s=>`<div class="stage-chip ${s.touched>0?'on':''}" style="--chip-color:${COLORS[s.color].c};--chip-bg:${COLORS[s.color].bg}">${esc(s.label)} ${s.touched}/${s.total}</div>`).join("")}</div>
          <div class="cust-dash-foot"><span>${docs.length} document${docs.length===1?"":"s"}</span><span>${formatBytes(size)}</span><span>${docs.length?timeAgo(docs[0].createdAt):"No activity"}</span></div>

  const addBtn = document.getElementById("dashAddCustBtn"); if(addBtn) addBtn.addEventListener("click", ()=>openCustomerModal());
  const addBtnEmpty = document.getElementById("dashAddCustBtnEmpty"); if(addBtnEmpty) addBtnEmpty.addEventListener("click", ()=>openCustomerModal());

/* ============================== Customer Profile (full page) ============================== */
let currentProfileCustomerId = null;

function stageStatus(touched, total){ return touched===0 ? "pending" : touched===total ? "done" : "progress"; }

function renderJourneyStepper(customerId){
  const stats = customerStageStats(customerId);
  const totalTouched = stats.reduce((s,x)=>s+x.touched,0);
  const totalAll = stats.reduce((s,x)=>s+x.total,0);
  const pct = totalAll ? Math.round((totalTouched/totalAll)*100) : 0;
  return `<div class="journey-wrap">
    <div class="journey-progress-label">${totalTouched} of ${totalAll} services engaged across the full customer journey (${pct}%)</div>
    <div class="journey-progress-bar"><div class="journey-progress-fill" style="width:${pct}%"></div></div>
    <div class="journey-stepper">
      ${stats.map((s,i)=>{
        const status = stageStatus(s.touched, s.total);
        const dot = status==="done" ? "✓" : (i+1);
        return `<div class="journey-step">
            <div class="journey-dot ${status}">${dot}</div>
            <div class="journey-label">${esc(s.label)}</div>
            <div class="journey-sub">${s.touched}/${s.total} services${status==="done"?" · complete":status==="progress"?" · in progress":" · not started"}</div>
          </div>` + (i<stats.length-1 ? `<div class="journey-line ${status==="done"?"done":""}"></div>` : "");
      }).join("")}
    </div>
  </div>`;
}

function refreshProfileIfOpen(){
  const page = document.getElementById("page-customer-profile");
  if(page && page.classList.contains("active") && currentProfileCustomerId) renderCustomerProfileBody(currentProfileCustomerId);
}

function openCustomerProfilePage(customerId){
  if(!customerById(customerId)) return;
  currentProfileCustomerId = customerId;
  renderCustomerProfileBody(customerId);
  switchTab("customer-profile");
  document.querySelectorAll(".navtab[data-tab]").forEach(b=>b.classList.toggle("active", b.dataset.tab==="dashboard"));
}

function renderCustomerProfileBody(customerId){
  const c = customerById(customerId);
  const container = document.getElementById("customerProfileBody");
  if(!c || !container) return;
  const docs = customerFiles(customerId);
  const totalBytes = docs.reduce((s,f)=>s+(f.size||0),0);
  const initials = c.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();

  const stageSections = STAGE_META.map(s=>{
    const branchIds = BRANCH_SECTIONS[s.key].items.map(it=>({id:branchId(s.key,it.slug), title:it.title}));
    const stageDocs = docs.filter(f=>branchIds.some(b=>b.id===f.folderId));
    const stat = customerStageStats(customerId).find(x=>x.key===s.key);
    const status = stageStatus(stat.touched, stat.total);
    const branchesWithDocs = branchIds.filter(b=>stageDocs.some(f=>f.folderId===b.id));
    return `<div class="stage-section">
      <div class="stage-section-head">
        <span class="stage-chip ${status!=="pending"?"on":""}" style="--chip-color:${COLORS[s.color].c};--chip-bg:${COLORS[s.color].bg}">${esc(s.label)} ${stat.touched}/${stat.total}</span>
      </div>
      ${branchesWithDocs.length ? branchesWithDocs.map(b=>{
        const bd = stageDocs.filter(f=>f.folderId===b.id);
        return `<div class="stage-branch-label">${esc(b.title)} · ${bd.length} doc${bd.length===1?"":"s"}</div>
          <div class="doc-list" style="margin-bottom:8px;">${bd.map(f=>`
            <div class="doc-row">
              <div class="doc-chip" style="background:var(--slate-200);color:var(--slate-700)">${esc(extOf(f.name))}</div>
              <div class="flex1"><div class="doc-name">${esc(f.name)}</div><div class="doc-meta">${formatBytes(f.size)} · ${timeAgo(f.createdAt)}</div></div>
              <div class="doc-actions">
                <button class="mini-btn" data-dl-profile="${f.id}" title="Download">⬇</button>
                <button class="mini-btn" data-del-profile="${f.id}" data-belongs="${f.folderId}" title="Delete">🗑</button>
              </div>
            </div>`).join("")}</div>`;
      }).join("") : `<div class="stage-empty">No documents in this stage yet.</div>`}
    </div>`;
  }).join("");

  container.innerHTML = `
    <div class="back-link" id="backToDash">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Dashboard
    </div>
    <div class="profile-head">
      <div class="cust-avatar" style="background:${customerColor(customerId)}">${esc(initials)}</div>
      <div>
        <h2>${esc(c.name)}</h2>
        <div class="meta">${esc(c.company||"No company")}${c.email?" · "+esc(c.email):""} · ${docs.length} document${docs.length===1?"":"s"} · ${formatBytes(totalBytes)}</div>
      </div>
      <div class="profile-actions">
        <button class="btn btn-ghost" id="setActiveFromProfile">Set as active</button>
        <button class="btn btn-danger" id="deleteCustFromProfile">Delete customer</button>
      </div>
    </div>

    <div class="section-head"><span class="section-bar"></span><h2>Journey Summary</h2></div>
    ${renderJourneyStepper(customerId)}

    <div class="section-head"><span class="section-bar"></span><h2>Add a Document</h2></div>
    <div class="panel" style="margin-bottom:24px;">
      <select id="profileBranchSelect" style="width:100%;padding:10px 12px;border:1px solid var(--slate-200);border-radius:9px;font-size:13px;margin-bottom:10px;">
        ${STAGE_META.map(s=>`<optgroup label="${esc(s.label)}">${BRANCH_SECTIONS[s.key].items.map(it=>`<option value="${branchId(s.key,it.slug)}">${esc(it.title)}</option>`).join("")}</optgroup>`).join("")}
      </select>
      <div class="doc-dropzone" id="profileDropzone" style="margin-bottom:0;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" style="margin:0 auto 6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Drag &amp; drop or click to upload to the selected service</span>
      </div>
    </div>

    <div class="section-head"><span class="section-bar"></span><h2>Documents by Stage</h2></div>
    <div class="panel">${stageSections}</div>
  `;

  document.getElementById("backToDash").addEventListener("click", ()=>{ currentProfileCustomerId = null; switchTab("dashboard"); });
  document.getElementById("setActiveFromProfile").addEventListener("click", ()=>{ setActiveCustomer(customerId); toast(`${c.name} set as active customer`); });
  document.getElementById("deleteCustFromProfile").addEventListener("click", async ()=>{
    await deleteCustomerRecord(customerId);
    currentProfileCustomerId = null;
    switchTab("dashboard");
  });
  container.querySelectorAll("[data-dl-profile]").forEach(b=>b.addEventListener("click", ()=>downloadFile(b.dataset.dlProfile)));
  container.querySelectorAll("[data-del-profile]").forEach(b=>b.addEventListener("click", async ()=>{
    const f = files.find(x=>x.id===b.dataset.delProfile); if(!f) return;
    if(!confirm(`Delete "${f.name}"? This can't be undone.`)) return;
    await del("files", f.id);
    files = files.filter(x=>x.id!==f.id);
    logActivity(`Deleted "${f.name}"`, "var(--red)");
    toast("Deleted");
    renderCustomerProfileBody(customerId);
    refreshAfterFileChange(f.folderId);
  }));

  const dz = document.getElementById("profileDropzone");
  const sel = document.getElementById("profileBranchSelect");
  dz.addEventListener("click", ()=>{
    pendingUpload = {bid: sel.value, customerId, onDone: ()=>{ renderCustomerProfileBody(customerId); refreshAfterFileChange(sel.value); }};
    document.getElementById("fileInput").click();
  });
  ["dragenter","dragover"].forEach(ev=>dz.addEventListener(ev,e=>{ e.preventDefault(); e.stopPropagation(); dz.classList.add("drag"); }));
  ["dragleave","drop"].forEach(ev=>dz.addEventListener(ev,e=>{ e.preventDefault(); e.stopPropagation(); dz.classList.remove("drag"); }));
  dz.addEventListener("drop", async e=>{
    e.preventDefault(); e.stopPropagation();
    if(e.dataTransfer.files.length){
      await uploadFilesForCustomerBranch(customerId, sel.value, e.dataTransfer.files);
      renderCustomerProfileBody(customerId);
      refreshAfterFileChange(sel.value);
    }
  });
}

const TABS = ["dashboard","business-map","customer-acquisition","service-delivery","revenue-billing","customer-support"];

function renderCustomerDashboardShell(){
  return `<header class="hero">
    <span class="badge">Client Overview</span>
    <h1>Customer Dashboard</h1>
    <p>Every customer, tracked from Customer Acquisition through Service Delivery, Revenue &amp; Billing and Customer Support — with their documents in one place.</p>
  </header>
  <div class="section"><div id="customerDashboardBody"></div></div>`;
}

function renderAllPages(){
  const wrap = document.getElementById("pages");
  wrap.innerHTML = TABS.map(key=>`<div class="tabpage" id="page-${key}"><div class="container">
    ${key==="dashboard" ? renderCustomerDashboardShell() : key==="business-map" ? renderBusinessMap() : renderFunctionalTab(key)}
  </div></div>`).join("") + `<div class="tabpage" id="page-customer-profile"><div class="container" id="customerProfileBody"></div></div>`;

  // wire branch expand/collapse
  wrap.querySelectorAll("[data-toggle]").forEach(head=>{
    head.addEventListener("click", ()=>{
      const bid = head.dataset.toggle;
      const card = document.getElementById("branch-"+bid);
      const wasOpen = card.classList.contains("open");
      card.classList.toggle("open");
      if(!wasOpen) renderDocBody(bid);
    });
  });

  // wire "View Full Document" buttons
  wrap.querySelectorAll("[data-viewdoc]").forEach(btn=>{
    btn.addEventListener("click", (e)=>{
      e.stopPropagation();
      openDocViewer(btn.dataset.viewdoc);
    });
  });

  // initialize doc counts
  document.querySelectorAll("[data-count]").forEach(el=>{
    const bid = el.dataset.count;
    const list = branchFiles(bid);
    el.textContent = list.length+" document"+(list.length===1?"":"s");
  });
}

function switchTab(key){
  if(key!=="customer-profile") currentProfileCustomerId = null;
  document.querySelectorAll(".tabpage").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-"+key).classList.add("active");
  document.querySelectorAll(".navtab[data-tab]").forEach(b=>b.classList.toggle("active", b.dataset.tab===key));
  window.scrollTo({top:0, behavior:"instant"});
}

function initNav(){
  document.querySelectorAll(".navtab[data-tab]").forEach(btn=>{
    btn.addEventListener("click", ()=>switchTab(btn.dataset.tab));
  });
  document.getElementById("storageBtn").addEventListener("click", openStorageModal);
  document.getElementById("customerSwitcherBtn").addEventListener("click", ()=>openCustomerModal());
  document.getElementById("modalOverlay").addEventListener("click", e=>{ if(e.target.id==="modalOverlay") closeModal(); });
  document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });
  document.getElementById("fileInput").addEventListener("change", async e=>{
    if(e.target.files.length && pendingUpload){
      const {bid, customerId, onDone} = pendingUpload;
      await uploadFilesForCustomerBranch(customerId, bid, e.target.files);
      if(onDone) onDone();
    }
    pendingUpload = null;
    e.target.value = "";
  });
}

/* ============================== Init ============================== */
async function init(){
  try{
    db = await openDB();
    files = await getAll("files");
    activityLog = (await getAll("activity")).sort((a,b)=>b.ts-a.ts);
    customers = await getAll("customers");
    const metaRow = await get("meta", "activeCustomerId");
    if(metaRow && metaRow.value && customerById(metaRow.value)) activeCustomerId = metaRow.value;
  }catch(e){
    toast("Storage unavailable in this browser context");
    console.error(e);
  }
  renderAllPages();
  initNav();
  updateCustomerSwitcherUI();
  renderCustomerDashboardBody("");
  switchTab("dashboard");
}

const GOOGLE_CLIENT_ID = "593344772657-ni4h4dregeoncvng1c6u2qsjtg8ri6i0.apps.googleusercontent.com";
const ALLOWED_EMAILS = ["katrina.sungahid@gmail.com"];
const AUTH_KEY = "rallysight_auth_session_v1";
const AUTH_TTL_MS = 30*24*60*60*1000; // 30 days

function getStoredSession(){
  try{
    const raw = localStorage.getItem(AUTH_KEY);
    if(!raw) return null;
    const s = JSON.parse(raw);
    if(!s || !s.email || !s.ts) return null;
    if(Date.now() - s.ts > AUTH_TTL_MS) return null;
    if(!ALLOWED_EMAILS.includes(s.email)) return null;
    return s;
  }catch(e){ return null; }
}
function storeSession(email, name, picture){
  localStorage.setItem(AUTH_KEY, JSON.stringify({email, name:name||"", picture:picture||"", ts: Date.now()}));
}
function clearSession(){ localStorage.removeItem(AUTH_KEY); }

function showLoginError(msg){
  const el = document.getElementById("loginError");
  if(!el) return;
  el.textContent = msg;
  el.style.display = "block";
}
function hideLoginError(){
  const el = document.getElementById("loginError");
  if(el) el.style.display = "none";
}

async function handleCredentialResponse(response){
  hideLoginError();
  try{
    const r = await fetch("https://oauth2.googleapis.com/tokeninfo?id_token=" + encodeURIComponent(response.credential));
    if(!r.ok) throw new Error("verify failed");
    const payload = await r.json();
    if(payload.aud !== GOOGLE_CLIENT_ID){
      showLoginError("Sign-in verification failed. Please try again.");
      return;
    }
    if(payload.email_verified !== "true" && payload.email_verified !== true){
      showLoginError("Your Google email isn't verified.");
      return;
    }
    if(!ALLOWED_EMAILS.includes(payload.email)){
      showLoginError(esc(payload.email) + " isn't authorized to access this dashboard.");
      if(window.google && google.accounts && google.accounts.id) google.accounts.id.disableAutoSelect();
      return;
    }
    storeSession(payload.email, payload.name, payload.picture);
    enterApp();
  }catch(e){
    showLoginError("Couldn't verify your Google account. Check your connection and try again.");
  }
}

function enterApp(){
  document.body.classList.remove("auth-pending");
  document.body.classList.add("auth-ok");
  init();
}

function signOut(){
  clearSession();
  if(window.google && google.accounts && google.accounts.id){
    google.accounts.id.disableAutoSelect();
  }
  location.reload();
}

function renderGoogleButton(){
  const container = document.getElementById("googleBtnContainer");
  if(!container) return;
  if(!(window.google && google.accounts && google.accounts.id)){
    setTimeout(renderGoogleButton, 300);
    return;
  }
  container.innerHTML = "";
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleCredentialResponse
  });
  google.accounts.id.renderButton(container, {theme:"outline", size:"large", width:280, text:"signin_with", shape:"pill"});
}

function boot(){
  const session = getStoredSession();
  if(session){
    enterApp();
    return;
  }
  renderGoogleButton();
}

document.addEventListener("DOMContentLoaded", ()=>{
  const signOutBtn = document.getElementById("signOutBtn");
  if(signOutBtn) signOutBtn.addEventListener("click", signOut);
  boot();
});
})();
</script>
