<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RallySight — Business Process Map</title>
<style>
  :root{
    --purple:#7c3aed; --purple-light:#ede9fe;
    --blue:#3b82f6; --blue-light:#dbeafe;
    --green:#10b981; --green-light:#d1fae5;
    --orange:#f59e0b; --orange-light:#fef3c7;
    --teal:#06b6d4; --teal-light:#cffafe;
    --red:#ef4444; --red-light:#fee2e2;
    --slate-900:#0f172a; --slate-700:#334155; --slate-500:#64748b;
    --slate-300:#cbd5e1; --slate-200:#e2e8f0; --slate-100:#f1f5f9;
    --bg:#f8f9fc; --card:#ffffff;
    --radius:16px;
    --shadow:0 1px 3px rgba(15,23,42,.07), 0 1px 2px rgba(15,23,42,.04);
    --shadow-lg:0 12px 28px rgba(15,23,42,.10), 0 2px 6px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--slate-900);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;}
  a{color:inherit;}
  svg{display:block;}

  /* Nav */
  .topnav{position:sticky;top:0;z-index:60;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--slate-200);}
  .nav-inner{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:6px;
    padding:0 24px;overflow-x:auto;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px;letter-spacing:-.2px;
    padding:14px 14px 14px 0;white-space:nowrap;}
  .brand-dot{width:11px;height:11px;border-radius:50%;background:var(--purple);box-shadow:0 0 0 4px var(--purple-light);}
  .navtab{border:none;background:transparent;padding:10px 16px;border-radius:999px;font-size:13.5px;font-weight:700;
    color:var(--slate-700);cursor:pointer;transition:.15s;white-space:nowrap;margin:8px 0;}
  .navtab:hover{color:var(--purple);background:var(--slate-100);}
  .navtab.active{background:var(--purple);color:#fff;box-shadow:0 2px 8px rgba(124,58,237,.35);}
  .navtab.disabled{color:var(--slate-300);cursor:not-allowed;}
  .navtab.disabled:hover{background:transparent;color:var(--slate-300);}
  .nav-spacer{flex:1;}
  .storage-btn{border:none;background:var(--slate-100);color:var(--slate-700);width:36px;height:36px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-left:6px;}
  .storage-btn:hover{background:var(--slate-200);}
  .customer-switcher{border:1.5px solid var(--purple);background:var(--purple-light);color:var(--purple);
    display:flex;align-items:center;gap:7px;padding:8px 12px;border-radius:999px;font-size:12.5px;font-weight:700;
    cursor:pointer;flex-shrink:0;white-space:nowrap;max-width:200px;}
  .customer-switcher:hover{background:#e3d5fc;}
  .customer-switcher span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px;}
  .customer-switcher.none{border-color:var(--slate-300);background:var(--slate-100);color:var(--slate-500);}

  /* Customer chips inside branch bodies */
  .customer-context{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;padding:9px 12px;
    border-radius:10px;background:#fff;border:1px solid var(--slate-200);font-size:12px;}
  .customer-context.warn{border-color:#fcd34d;background:#fffbeb;color:#92400e;font-weight:600;}
  .customer-context .switch-link{color:var(--purple);font-weight:700;cursor:pointer;text-decoration:underline;}
  .doc-customer-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;
    border-radius:999px;background:var(--slate-100);color:var(--slate-700);flex-shrink:0;white-space:nowrap;}
  .doc-customer-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .doc-dropzone.disabled{opacity:.55;cursor:not-allowed;}
  .doc-filter{width:100%;padding:8px 11px;border:1px solid var(--slate-200);border-radius:9px;font-size:12px;
    margin-bottom:10px;outline:none;}
  .doc-filter:focus{border-color:var(--purple);}

  /* Customers modal list */
  .cust-row{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--slate-200);border-radius:10px;margin-bottom:8px;cursor:pointer;}
  .cust-row:hover{border-color:var(--purple);background:var(--purple-light);}
  .cust-row.active{border-color:var(--purple);background:var(--purple-light);}
  .cust-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:12px;color:#fff;flex-shrink:0;}
  .cust-info{flex:1;min-width:0;}
  .cust-info .cname{font-size:13px;font-weight:700;}
  .cust-info .cmeta{font-size:11px;color:var(--slate-500);}
  .cust-actions{display:flex;gap:4px;}
  .cust-form{display:flex;flex-direction:column;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--slate-200);}
  .cust-form input{padding:9px 12px;border:1px solid var(--slate-200);border-radius:9px;font-size:13px;outline:none;}
  .cust-form input:focus{border-color:var(--purple);}

  .container{max-width:1240px;margin:0 auto;padding:0 24px 90px;}
  .tabpage{display:none;}
  .tabpage.active{display:block;}

  /* Hero */
  .hero{max-width:900px;margin:0 auto;padding:44px 24px 6px;text-align:center;}
  .badge{display:inline-block;background:var(--purple-light);color:var(--purple);font-weight:700;font-size:12.5px;
    padding:6px 16px;border-radius:999px;margin-bottom:16px;}
  .hero h1{font-size:34px;margin:0 0 10px;letter-spacing:-1px;font-weight:800;}
  .hero p{color:var(--slate-500);font-size:15px;max-width:600px;margin:0 auto;line-height:1.55;}

  .section{margin:40px 0;}
  .section-head{display:flex;align-items:center;gap:10px;margin:0 0 16px;}
  .section-bar{width:5px;height:20px;border-radius:3px;background:var(--purple);}
  .section-head h2{font-size:18px;margin:0;font-weight:800;}

  .panel{background:var(--card);border:1px solid var(--slate-200);border-radius:20px;box-shadow:var(--shadow);padding:22px;}

  /* Org chart */
  .org-wrap{overflow-x:auto;padding:6px;}
  .org-tree{display:flex;flex-direction:column;align-items:center;gap:0;min-width:600px;}
  .org-row{display:flex;justify-content:center;gap:36px;position:relative;}
  .org-children{display:flex;flex-direction:column;align-items:center;}
  .org-node{border:1.5px solid; border-radius:12px;padding:10px 16px;background:#fff;text-align:center;min-width:130px;
    font-size:12.5px;font-weight:800;margin:8px 6px;position:relative;}
  .org-node .sub{font-weight:500;color:var(--slate-500);font-size:11px;margin-top:2px;}
  .org-connector{width:2px;background:var(--slate-300);height:18px;margin:0 auto;}
  .org-hbar{height:2px;background:var(--slate-300);}
  .legend-row{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:22px;padding-top:18px;border-top:1px solid var(--slate-200);}
  .legend-chip{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--slate-700);}
  .legend-dot{width:11px;height:11px;border-radius:4px;}

  /* Info cards (sources/components/streams/channels) */
  .info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .info-card{border:1px solid var(--slate-200);border-radius:14px;padding:16px;background:#fff;}
  .info-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-weight:800;font-size:12px;}
  .info-card h4{margin:0 0 3px;font-size:13.5px;}
  .info-card p{margin:0 0 8px;font-size:12px;color:var(--slate-500);}
  .info-tag{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;}

  /* Branch cards (documents) */
  .branch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .branch-card{border:1px solid var(--slate-200);border-radius:16px;background:#fff;overflow:hidden;transition:.15s;}
  .branch-card:hover{box-shadow:var(--shadow-lg);}
  .branch-head{display:flex;align-items:center;gap:12px;padding:16px;cursor:pointer;}
  .branch-chip{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:12.5px;flex-shrink:0;}
  .branch-info{flex:1;min-width:0;}
  .branch-info h4{margin:0 0 4px;font-size:14px;}
  .branch-tag{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;margin-right:6px;}
  .branch-doc-count{font-size:11px;color:var(--slate-500);font-weight:600;}
  .branch-chevron{transition:.2s;color:var(--slate-500);flex-shrink:0;}
  .branch-card.open .branch-chevron{transform:rotate(180deg);}
  .branch-body{display:none;border-top:1px solid var(--slate-200);padding:16px;background:var(--slate-100);}
  .branch-card.open .branch-body{display:block;}

  /* Document mini-manager (reused inside branch body) */
  .doc-dropzone{border:2px dashed var(--slate-300);border-radius:12px;padding:16px;text-align:center;cursor:pointer;
    background:#fff;margin-bottom:12px;transition:.15s;}
  .doc-dropzone.drag{border-color:var(--purple);background:var(--purple-light);}
  .doc-dropzone span{font-size:12px;color:var(--slate-500);font-weight:600;}
  .doc-list{display:flex;flex-direction:column;gap:8px;}
  .doc-row{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--slate-200);border-radius:10px;padding:9px 11px;}
  .doc-chip{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;}
  .doc-row .flex1{flex:1;min-width:0;}
  .doc-name{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .doc-meta{font-size:10.5px;color:var(--slate-500);}
  .doc-actions{display:flex;gap:4px;}
  .mini-btn{width:26px;height:26px;border-radius:7px;border:none;background:var(--slate-100);color:var(--slate-500);
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
  .mini-btn:hover{background:var(--slate-200);color:var(--slate-900);}
  .doc-empty{font-size:12px;color:var(--slate-500);text-align:center;padding:10px;}

  /* Workflow */
  .workflow-wrap{overflow-x:auto;padding:8px 4px;}
  .workflow-row{display:flex;gap:10px;min-width:max-content;}
  .wf-step{width:150px;flex-shrink:0;text-align:center;position:relative;}
  .wf-num{width:30px;height:30px;border-radius:50%;background:var(--purple);color:#fff;font-weight:800;font-size:13px;
    display:flex;align-items:center;justify-content:center;margin:0 auto 8px;}
  .wf-step h5{margin:0 0 3px;font-size:12.5px;}
  .wf-step p{margin:0;font-size:11px;color:var(--slate-500);}
  .wf-arrow{color:var(--slate-300);display:flex;align-items:center;flex-shrink:0;}

  /* KPI grid */
  .kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .kpi-card{border:1px solid var(--slate-200);border-radius:14px;padding:14px;background:#fff;}
  .kpi-trend{font-size:11px;font-weight:800;margin-bottom:6px;display:inline-block;padding:2px 7px;border-radius:999px;}
  .kpi-trend.up{color:#059669;background:var(--green-light);}
  .kpi-trend.down{color:#b91c1c;background:var(--red-light);}
  .kpi-trend.flat{color:var(--slate-500);background:var(--slate-100);}
  .kpi-value{font-size:20px;font-weight:800;letter-spacing:-.4px;}
  .kpi-label{font-size:11.5px;font-weight:700;margin-top:4px;}
  .kpi-target{font-size:10.5px;color:var(--slate-500);margin-top:2px;}

  /* Storage summary strip */
  .stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:8px;}
  .stat-card{background:var(--card);border:1px solid var(--slate-200);border-radius:16px;padding:16px;box-shadow:var(--shadow);}
  .stat-num{font-size:21px;font-weight:800;letter-spacing:-.4px;}
  .stat-label{color:var(--slate-500);font-size:12px;font-weight:600;margin-top:2px;}

  .empty-note{padding:40px 20px;text-align:center;color:var(--slate-500);font-size:13.5px;}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;
    z-index:100;opacity:0;pointer-events:none;transition:.15s;padding:20px;}
  .modal-overlay.show{opacity:1;pointer-events:auto;}
  .modal-box{background:#fff;border-radius:16px;padding:22px;width:420px;max-width:92vw;box-shadow:var(--shadow-lg);
    transform:translateY(10px);transition:.15s;max-height:86vh;overflow:auto;}
  .modal-overlay.show .modal-box{transform:translateY(0);}
  .modal-box h3{margin:0 0 14px;font-size:16px;}
  .modal-box input[type=text]{width:100%;padding:10px 12px;border:1px solid var(--slate-200);border-radius:10px;
    font-size:14px;outline:none;margin-bottom:16px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;}
  .btn{border:none;border-radius:10px;padding:9px 16px;font-size:13.5px;font-weight:700;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;}
  .btn-primary{background:var(--purple);color:#fff;}
  .btn-primary:hover{background:#6d28d9;}
  .btn-ghost{background:var(--slate-100);color:var(--slate-700);}
  .btn-ghost:hover{background:var(--slate-200);}
  .btn-danger{background:var(--red-light);color:#b91c1c;}
  .btn-danger:hover{background:#fecaca;}
  .modal-close{position:absolute;top:16px;right:16px;background:var(--slate-100);border:none;width:28px;height:28px;
    border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--slate-500);}
  .settings-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--slate-200);gap:16px;}
  .settings-row:last-child{border-bottom:none;}
  .settings-row h4{margin:0 0 3px;font-size:13.5px;}
  .settings-row p{margin:0;font-size:11.5px;color:var(--slate-500);}
  .activity-item{display:flex;gap:10px;padding:10px 12px;border-left:3px solid var(--slate-200);background:var(--slate-100);
    border-radius:0 8px 8px 0;margin-bottom:7px;font-size:12.5px;}
  .activity-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0;}
  .activity-time{font-size:10.5px;color:var(--slate-500);}

  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--slate-900);
    color:#fff;padding:11px 20px;border-radius:10px;font-size:13.5px;font-weight:600;opacity:0;transition:.2s;z-index:200;pointer-events:none;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media(max-width:900px){
    .info-grid{grid-template-columns:repeat(2,1fr);}
    .branch-grid{grid-template-columns:repeat(2,1fr);}
    .kpi-grid{grid-template-columns:repeat(2,1fr);}
    .stat-strip{grid-template-columns:repeat(2,1fr);}
  }
  @media(max-width:560px){
    .info-grid{grid-template-columns:1fr;}
    .branch-grid{grid-template-columns:1fr;}
    .kpi-grid{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-inner" id="navInner">
    <div class="brand"><span class="brand-dot"></span>RallySight</div>
    <button class="navtab disabled" title="Not available in this prototype">Architecture</button>

      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>

    </button>
  </div>
</nav>

<div id="pages"></div>

<div class="modal-overlay" id="modalOverlay"><div class="modal-box" id="modalBox" style="position:relative;"></div></div>

/* ============================== IndexedDB ============================== */
const DB_NAME = "rallysight_business_map_db_v1";
const DB_VERSION = 2;
let db;
function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e=>{
      const d = e.target.result;
      if(!d.objectStoreNames.contains("files")){
        const fs = d.createObjectStore("files", {keyPath:"id"});
        fs.createIndex("folderId","folderId");
        fs.createIndex("customerId","customerId");
      }
      if(!d.objectStoreNames.contains("activity")) d.createObjectStore("activity", {keyPath:"id"});
      if(!d.objectStoreNames.contains("customers")) d.createObjectStore("customers", {keyPath:"id"});
      if(!d.objectStoreNames.contains("meta")) d.createObjectStore("meta", {keyPath:"key"});
    };
    req.onsuccess = e=>resolve(e.target.result);
    req.onerror = e=>reject(e.target.error);
  });
}
function tx(store,mode){ return db.transaction(store,mode).objectStore(store); }
function put(store,obj){ return new Promise((res,rej)=>{ const r=tx(store,"readwrite").put(obj); r.onsuccess=()=>res(obj); r.onerror=()=>rej(r.error); }); }
function del(store,id){ return new Promise((res,rej)=>{ const r=tx(store,"readwrite").delete(id); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); }
function getAll(store){ return new Promise((res,rej)=>{ const r=tx(store,"readonly").getAll(); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }

const CUSTOMER_COLORS = ["purple","blue","green","orange","teal","red"];
function customerColor(id){ if(!id) return "var(--slate-500)"; let h=0; for(let i=0;i<id.length;i++) h=(h*31+id.charCodeAt(i))>>>0; return COLORS[CUSTOMER_COLORS[h%CUSTOMER_COLORS.length]].c; }
function customerById(id){ return customers.find(c=>c.id===id); }
function customerLabel(id){ const c = customerById(id); return c ? c.name : "Unassigned"; }
const uid = ()=> (crypto.randomUUID ? crypto.randomUUID() : "id-"+Date.now()+"-"+Math.random().toString(16).slice(2));

function formatBytes(b){ if(!b) return "0 B"; const u=["B","KB","MB","GB"]; let i=0; while(b>=1024&&i<u.length-1){b/=1024;i++;} return (i===0?b:b.toFixed(1))+" "+u[i]; }
function timeAgo(ts){ const s=Math.floor((Date.now()-ts)/1000); if(s<10)return "just now"; if(s<60)return s+"s ago"; const m=Math.floor(s/60); if(m<60)return m+"m ago"; const h=Math.floor(m/60); if(h<24)return h+"h ago"; const d=Math.floor(h/24); return d+"d ago"; }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function extOf(name){ const p=name.split("."); return p.length>1 ? p.pop().toUpperCase().slice(0,4) : "FILE"; }

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove("show"), 2200);
}

async function logActivity(text, color){
  const entry = {id:uid(), text, color, ts:Date.now()};
  await put("activity", entry);
  activityLog.unshift(entry);
  if(activityLog.length>300){ const rem=activityLog.pop(); del("activity", rem.id); }
}

  if(!body) return;

  const shown = list.filter(f=> !filterText || f.name.toLowerCase().includes(filterText) || customerLabel(f.customerId).toLowerCase().includes(filterText));
  const hasActive = !!activeCustomerId;

  body.innerHTML = `
    <div class="customer-context ${hasActive?'':'warn'}">
      ${hasActive
        ? `<span class="doc-customer-dot" style="background:${customerColor(activeCustomerId)}"></span> Uploading as <strong>${esc(activeName)}</strong> — <span class="switch-link" data-switch-customer="1">switch customer</span>`

      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" style="margin:0 auto 6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span>${hasActive ? `Drag &amp; drop or click to upload documents for <strong>${esc(activeName)}</strong>` : "Select a customer above to enable uploads"}</span>

    ${list.length>3 ? `<input type="text" class="doc-filter" data-filter="${bid}" placeholder="Filter by document or customer name..." value="${esc(filterText)}">` : ""}
    <div class="doc-list">${shown.length ? shown.map(f=>`
      <div class="doc-row">
        <div class="doc-chip" style="background:var(--slate-200);color:var(--slate-700)">${esc(extOf(f.name))}</div>
        <div class="flex1">
          <div class="doc-name">${esc(f.name)}</div>

        <span class="doc-customer-tag"><span class="doc-customer-dot" style="background:${customerColor(f.customerId)}"></span>${esc(customerLabel(f.customerId))}</span>
        <div class="doc-actions">
          <button class="mini-btn" data-dl="${f.id}" title="Download">⬇</button>

        </div>
      </div>`).join("") : `<div class="doc-empty">${list.length ? "No documents match that filter." : "No documents stored yet for this branch."}</div>`}
    </div>`;

  const dz = body.querySelector(`[data-dz]`);
  dz.addEventListener("click", ()=>{
    if(!activeCustomerId){ openCustomerModal(bid); return; }
    activeBranchForUpload = bid; document.getElementById("fileInput").click();
  });
  ["dragenter","dragover"].forEach(ev=>dz.addEventListener(ev,e=>{ e.preventDefault(); e.stopPropagation(); if(activeCustomerId) dz.classList.add("drag"); }));
  ["dragleave","drop"].forEach(ev=>dz.addEventListener(ev,e=>{ e.preventDefault(); e.stopPropagation(); dz.classList.remove("drag"); }));
  dz.addEventListener("drop", e=>{ if(!activeCustomerId){ openCustomerModal(bid); return; } if(e.dataTransfer.files.length) handleBranchFiles(bid, e.dataTransfer.files); });

  body.querySelectorAll("[data-switch-customer]").forEach(el=>el.addEventListener("click",()=>openCustomerModal(bid)));
  const filterInput = body.querySelector("[data-filter]");

  }

  body.querySelectorAll("[data-dl]").forEach(b=>b.addEventListener("click",(e)=>{ e.stopPropagation(); downloadFile(b.dataset.dl); }));
  body.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",(e)=>{ e.stopPropagation(); deleteFile(b.dataset.del, b.dataset.belongs); }));
}

async function handleBranchFiles(bid, fileList){
  if(!activeCustomerId){ toast("Select a customer first"); openCustomerModal(bid); return; }
  const list = Array.from(fileList);
  for(const f of list){
    const record = {id:uid(), name:f.name, type:f.type||"application/octet-stream", size:f.size, blob:f, folderId:bid, customerId:activeCustomerId, createdAt:Date.now()};
    await put("files", record);
    files.push(record);
  }
  const label = branchLabel(bid);
  const cname = customerLabel(activeCustomerId);
  logActivity(`Uploaded ${list.length} document${list.length===1?"":"s"} to "${label}" for ${cname}`, "var(--blue)");
  toast(`${list.length} document${list.length===1?"":"s"} uploaded for ${cname}`);
  renderDocBody(bid);
  updateStorageStats();
}

function branchLabel(bid){
  for(const key in BRANCH_SECTIONS){
    const found = BRANCH_SECTIONS[key].items.find(it=>branchId(key,it.slug)===bid);
    if(found) return found.title;
  }
  return bid;
}

function downloadFile(id){
  const f = files.find(x=>x.id===id); if(!f) return;
  const url = URL.createObjectURL(f.blob);
  const a = document.createElement("a"); a.href=url; a.download=f.name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
  logActivity(`Downloaded "${f.name}"`, "var(--teal)");
}

async function deleteFile(id, bid){
  const f = files.find(x=>x.id===id); if(!f) return;
  if(!confirm(`Delete "${f.name}"? This can't be undone.`)) return;
  await del("files", id);
  files = files.filter(x=>x.id!==id);
  logActivity(`Deleted "${f.name}"`, "var(--red)");
  toast("Deleted");
  renderDocBody(bid);
  updateStorageStats();
}

/* ============================== Global storage stats / activity modal ============================== */
async function updateStorageStats(){
  const totalDocs = files.length;
  const totalBytes = files.reduce((s,f)=>s+(f.size||0),0);
  const branchesUsed = new Set(files.map(f=>f.folderId)).size;
  const el = document.getElementById("modalBox");
  if(el && el.dataset.mode === "storage"){
    document.getElementById("aggDocs").textContent = totalDocs;
    document.getElementById("aggSize").textContent = formatBytes(totalBytes);
    document.getElementById("aggBranches").textContent = branchesUsed;
  }
}

function openStorageModal(){
  const overlay = document.getElementById("modalOverlay");
  const box = document.getElementById("modalBox");
  box.dataset.mode = "storage";
  box.style.width = "480px";
  const totalDocs = files.length;
  const totalBytes = files.reduce((s,f)=>s+(f.size||0),0);
  const branchesUsed = new Set(files.map(f=>f.folderId)).size;
  box.innerHTML = `
    <button class="modal-close" id="modalCloseBtn">✕</button>
    <h3>Storage &amp; Activity</h3>
    <div class="stat-strip" style="grid-template-columns:repeat(4,1fr);margin-bottom:18px;">
      <div class="stat-card"><div class="stat-num" id="aggDocs">${totalDocs}</div><div class="stat-label">Documents</div></div>
      <div class="stat-card"><div class="stat-num" id="aggSize">${formatBytes(totalBytes)}</div><div class="stat-label">Storage used</div></div>
      <div class="stat-card"><div class="stat-num" id="aggBranches">${branchesUsed}</div><div class="stat-label">Branches with docs</div></div>
      <div class="stat-card"><div class="stat-num" id="aggCustomers">${customers.length}</div><div class="stat-label">Customers</div></div>
    </div>
    <div class="settings-row">
      <div><h4>Manage customers</h4><p>Add, switch, or remove customers in your client database.</p></div>
      <button class="btn btn-ghost" id="manageCustBtn">Open</button>
    </div>
    <div class="settings-row">
      <div><h4>Export document inventory</h4><p>CSV list of every stored document, its branch, and customer.</p></div>
      <button class="btn btn-ghost" id="exportBtn">Export</button>
    </div>
    <div class="settings-row">
      <div><h4>Clear all data</h4><p>Permanently deletes every stored document in this browser.</p></div>
      <button class="btn btn-danger" id="clearAllBtn">Clear</button>
    </div>
    <h3 style="margin-top:18px;">Recent Activity</h3>
    <div id="activityList"></div>
  `;
  renderActivityList();
  document.getElementById("modalCloseBtn").onclick = closeModal;
  document.getElementById("exportBtn").onclick = exportCSV;
  document.getElementById("clearAllBtn").onclick = clearAll;
  document.getElementById("manageCustBtn").onclick = ()=>openCustomerModal();
  overlay.classList.add("show");
}

function renderActivityList(){
  const c = document.getElementById("activityList");
  if(!c) return;
  if(activityLog.length===0){ c.innerHTML = `<div class="doc-empty">No activity yet.</div>`; return; }
  c.innerHTML = activityLog.slice(0,30).map(a=>`
    <div class="activity-item" style="border-left-color:${a.color}">
      <span class="activity-dot" style="background:${a.color}"></span>
      <div><div>${esc(a.text)}</div><div class="activity-time">${timeAgo(a.ts)}</div></div>
    </div>`).join("");
}

function exportCSV(){
  const rows = [["Customer","Branch","Document Name","Size (bytes)","Type","Added"]];
  files.forEach(f=> rows.push([customerLabel(f.customerId), branchLabel(f.folderId), f.name, f.size, f.type, new Date(f.createdAt).toISOString()]));
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download="document-inventory.csv";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
  toast("Inventory exported");
}

async function clearAll(){
  if(!confirm("This will permanently delete ALL stored documents and customers. Continue?")) return;
  if(!confirm("Are you absolutely sure? This cannot be undone.")) return;
  for(const f of files) await del("files", f.id);
  for(const a of activityLog) await del("activity", a.id);
  for(const c of customers) await del("customers", c.id);
  await put("meta", {key:"activeCustomerId", value:null});
  files = []; activityLog = []; customers = []; activeCustomerId = null;
  updateCustomerSwitcherUI();
  toast("All data cleared");
  closeModal();
  document.querySelectorAll(".branch-card").forEach(card=>{
    const bid = card.dataset.branch;
    if(card.classList.contains("open")) renderDocBody(bid);
    const countEl = document.querySelector(`[data-count="${bid}"]`);
    if(countEl) countEl.textContent = "0 documents";
  });
}

function closeModal(){ document.getElementById("modalOverlay").classList.remove("show"); }

/* ============================== Customers (client CRM) ============================== */
function customerDocCount(id){ return files.filter(f=>f.customerId===id).length; }

function updateCustomerSwitcherUI(){
  const btn = document.getElementById("customerSwitcherBtn");
  const label = document.getElementById("customerSwitcherLabel");
  if(activeCustomerId && customerById(activeCustomerId)){
    label.textContent = customerById(activeCustomerId).name;
    btn.classList.remove("none");
  } else {
    label.textContent = "Select customer";
    btn.classList.add("none");
    activeCustomerId = null;
  }
}

async function setActiveCustomer(id){
  activeCustomerId = id;
  await put("meta", {key:"activeCustomerId", value:id});
  updateCustomerSwitcherUI();
  document.querySelectorAll(".branch-card.open").forEach(card=>renderDocBody(card.dataset.branch));
}

async function addCustomerRecord(name, company, email){
  const rec = {id:uid(), name:name.trim(), company:(company||"").trim(), email:(email||"").trim(), createdAt:Date.now()};
  await put("customers", rec);
  customers.push(rec);
  logActivity(`Added customer "${rec.name}"`, "var(--purple)");
  return rec;
}

async function deleteCustomerRecord(id){
  const c = customerById(id); if(!c) return;
  const docCount = customerDocCount(id);
  const msg = docCount>0
    ? `Delete "${c.name}"? Their ${docCount} document${docCount===1?"":"s"} will be kept but marked Unassigned.`
    : `Delete "${c.name}"?`;
  if(!confirm(msg)) return;
  await del("customers", id);
  customers = customers.filter(x=>x.id!==id);
  if(activeCustomerId===id){ activeCustomerId=null; await put("meta",{key:"activeCustomerId", value:null}); }
  logActivity(`Deleted customer "${c.name}"`, "var(--red)");
  updateCustomerSwitcherUI();
  openCustomerModal();
}

function openCustomerModal(returnBid){
  const overlay = document.getElementById("modalOverlay");
  const box = document.getElementById("modalBox");
  box.dataset.mode = "customers";
  box.style.width = "440px";
  const search = "";
  box.innerHTML = `
    <button class="modal-close" id="modalCloseBtn">✕</button>
    <h3>Customers</h3>
    <input type="text" id="custSearch" placeholder="Search customers..." style="margin-bottom:12px;">
    <div id="custList"></div>
    <div class="cust-form">
      <input type="text" id="custName" placeholder="Customer / company name *">
      <input type="text" id="custCompany" placeholder="Company (optional)">
      <input type="text" id="custEmail" placeholder="Email (optional)">
      <button class="btn btn-primary" id="custAddBtn" style="justify-content:center;">+ Add customer</button>
    </div>
  `;
  overlay.classList.add("show");

  function renderList(filterText){
    filterText = (filterText||"").toLowerCase();
    const list = customers.filter(c=> !filterText || c.name.toLowerCase().includes(filterText) || (c.company||"").toLowerCase().includes(filterText));
    const c1 = document.getElementById("custList");
    if(!list.length){ c1.innerHTML = `<div class="doc-empty">${customers.length ? "No matches." : "No customers yet — add one below."}</div>`; return; }
    c1.innerHTML = list.map(c=>{
      const initials = c.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
      const dc = customerDocCount(c.id);
      return `<div class="cust-row ${c.id===activeCustomerId?'active':''}" data-select="${c.id}">
        <div class="cust-avatar" style="background:${customerColor(c.id)}">${esc(initials)}</div>
        <div class="cust-info"><div class="cname">${esc(c.name)}</div><div class="cmeta">${esc(c.company||"")}${c.company?" · ":""}${dc} document${dc===1?"":"s"}</div></div>
        <div class="cust-actions"><button class="mini-btn" data-del-cust="${c.id}" title="Delete">🗑</button></div>
      </div>`;
    }).join("");
    c1.querySelectorAll("[data-select]").forEach(el=>el.addEventListener("click", (e)=>{
      if(e.target.closest("[data-del-cust]")) return;
      setActiveCustomer(el.dataset.select);
      closeModal();
      if(returnBid) renderDocBody(returnBid);
    }));
    c1.querySelectorAll("[data-del-cust]").forEach(el=>el.addEventListener("click", (e)=>{ e.stopPropagation(); deleteCustomerRecord(el.dataset.delCust); }));
  }
  renderList(search);

  document.getElementById("custSearch").addEventListener("input", e=>renderList(e.target.value));
  document.getElementById("modalCloseBtn").onclick = closeModal;
  document.getElementById("custAddBtn").onclick = async ()=>{
    const nameEl = document.getElementById("custName");
    const name = nameEl.value.trim();
    if(!name){ nameEl.focus(); return; }
    const rec = await addCustomerRecord(name, document.getElementById("custCompany").value, document.getElementById("custEmail").value);
    toast(`Customer "${rec.name}" added`);
    setActiveCustomer(rec.id);
    document.getElementById("custName").value = "";
    document.getElementById("custCompany").value = "";
    document.getElementById("custEmail").value = "";
    renderList(document.getElementById("custSearch").value);
  };
}

/* ============================== Tabs / navigation ============================== */
const TABS = ["business-map","customer-acquisition","service-delivery","revenue-billing","customer-support"];

function renderAllPages(){
  const wrap = document.getElementById("pages");
  wrap.innerHTML = TABS.map(key=>`<div class="tabpage" id="page-${key}"><div class="container">
    ${key==="business-map" ? renderBusinessMap() : renderFunctionalTab(key)}
  </div></div>`).join("");

  // wire branch expand/collapse
  wrap.querySelectorAll("[data-toggle]").forEach(head=>{
    head.addEventListener("click", ()=>{
      const bid = head.dataset.toggle;
      const card = document.getElementById("branch-"+bid);
      const wasOpen = card.classList.contains("open");
      card.classList.toggle("open");
      if(!wasOpen) renderDocBody(bid);
    });
  });

  // initialize doc counts
  document.querySelectorAll("[data-count]").forEach(el=>{
    const bid = el.dataset.count;
    const list = branchFiles(bid);
    el.textContent = list.length+" document"+(list.length===1?"":"s");
  });
}

function switchTab(key){
  document.querySelectorAll(".tabpage").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-"+key).classList.add("active");
  document.querySelectorAll(".navtab[data-tab]").forEach(b=>b.classList.toggle("active", b.dataset.tab===key));
  window.scrollTo({top:0, behavior:"instant"});
}

function initNav(){
  document.querySelectorAll(".navtab[data-tab]").forEach(btn=>{
    btn.addEventListener("click", ()=>switchTab(btn.dataset.tab));
  });
  document.getElementById("storageBtn").addEventListener("click", openStorageModal);
  document.getElementById("customerSwitcherBtn").addEventListener("click", ()=>openCustomerModal());
  document.getElementById("modalOverlay").addEventListener("click", e=>{ if(e.target.id==="modalOverlay") closeModal(); });
  document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });
  document.getElementById("fileInput").addEventListener("change", e=>{
    if(e.target.files.length && activeBranchForUpload) handleBranchFiles(activeBranchForUpload, e.target.files);
    e.target.value = "";
  });
}

/* ============================== Init ============================== */
async function init(){
  try{
    db = await openDB();
    files = await getAll("files");
    activityLog = (await getAll("activity")).sort((a,b)=>b.ts-a.ts);
    customers = await getAll("customers");
    const metaRow = await get("meta", "activeCustomerId");
    if(metaRow && metaRow.value && customerById(metaRow.value)) activeCustomerId = metaRow.value;
  }catch(e){
    toast("Storage unavailable in this browser context");
    console.error(e);
  }
  renderAllPages();
  initNav();
  updateCustomerSwitcherUI();
  switchTab("business-map");
}

document.addEventListener("DOMContentLoaded", init);
})();
</script>
</body>
